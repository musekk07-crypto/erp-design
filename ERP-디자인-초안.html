/* 배포 빌드에서 purge 되지 않도록 source(none)으로 import */

/* GNB 메인 메뉴 — 선택·호버 시 단색 보라 배경, nav 높이 꽉 채움 */
.main-nav-item {
  display: flex;
  align-items: center;
  flex-shrink: 0;
  white-space: nowrap;
  align-self: stretch;
  margin: 0;
  padding: 0 16px;
  font-size: 14px;
  font-weight: 400;
  color: var(--nav-text-muted, rgba(255, 255, 255, 0.7));
  background: transparent;
  border: none;
  border-radius: 0;
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
}

.main-nav-item.is-active,
.main-nav-item:not(.is-active):hover {
  font-weight: 600;
  color: var(--nav-active-text, #ffffff);
  background: var(--nav-active-bg, #7c3aed);
}

/* 상세 패널 — 폴더 탭 (회원정보 페이지 내부) */
.member-page-chrome {
  flex-shrink: 0;
  width: 100%;
  margin-bottom: 8px;
  background: transparent;
  border: none;
  border-radius: 0;
  overflow: visible;
}

.member-page-chrome .detail-tab-bar {
  padding: 0 6px;
  min-height: 32px;
}

.member-page-chrome .detail-tab {
  padding: 6px 12px 5px;
  font-size: 13px;
}

.member-page-chrome .detail-tab.is-active {
  padding-top: 4px;
}

.member-page-chrome .detail-tab-divider {
  margin-bottom: 6px;
  font-size: 12px;
}

.detail-tab-bar {
  display: flex;
  align-items: flex-end;
  padding: 0 8px;
  min-height: 34px;
  background: var(--detail-tab-bar-bg);
  border-bottom: 1px solid var(--detail-tab-bar-line);
}

.detail-tab-list {
  display: flex;
  align-items: flex-end;
  flex-wrap: nowrap;
  min-width: 0;
}

.detail-tab-divider {
  align-self: center;
  padding: 0 3px;
  font-size: 12px;
  color: var(--text-subtle);
  user-select: none;
  line-height: 1;
  margin-bottom: 8px;
}

.detail-tab {
  position: relative;
  flex-shrink: 0;
  padding: 7px 14px 6px;
  font-size: 13px;
  font-weight: 400;
  color: var(--text-muted);
  background: transparent;
  border: none;
  cursor: pointer;
  white-space: nowrap;
  transition: color 0.15s;
}

.detail-tab:hover:not(.is-active) {
  color: var(--text-body);
}

.detail-tab.is-active {
  font-weight: 600;
  color: var(--text-body);
  background: var(--surface-panel);
  border: 1px solid var(--detail-tab-bar-line);
  border-top: 3px solid var(--detail-tab-active-top);
  border-bottom-color: var(--surface-panel);
  margin-bottom: -1px;
  padding-top: 5px;
  border-radius: 3px 3px 0 0;
}

/* 회원정보 탭 전용 — 아이콘 툴바 (참고 UI) */
.member-info-toolbar {
  display: flex;
  align-items: flex-start;
  flex-wrap: wrap;
  gap: 2px;
  padding: 6px 8px 8px;
  background: var(--surface-panel);
  border-bottom: 1px solid var(--border);
}

.member-info-toolbar-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  min-width: 54px;
  padding: 4px 8px;
  border: none;
  border-radius: 4px;
  background: transparent;
  cursor: pointer;
  color: var(--text-body);
  font-size: 12px;
  line-height: 1.2;
  white-space: nowrap;
  transition: background 0.15s;
}

.member-info-toolbar-item:hover {
  background: var(--surface-row-hover);
}

.member-info-toolbar-separator {
  width: 1px;
  height: 38px;
  margin: 2px 6px 0;
  background: var(--border);
  flex-shrink: 0;
  align-self: center;
}

.detail-action-bar {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 5px 8px;
  background: transparent;
  border-bottom: none;
  min-height: 36px;
}

/* 회원관리2 — 프로필 카드 + 사이드 섹션 */
.mm2-view {
  display: flex;
  flex-direction: column;
  height: 100%;
  min-height: 0;
  width: 100%;
}

.mm2-scroll {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 8px;
  background: var(--surface-page);
}

.mm2-profile-card {
  display: flex;
  gap: 16px;
  padding: 14px 16px;
  margin-bottom: 10px;
  background: var(--surface-panel);
  border: 1px solid var(--border);
  border-radius: 6px;
}

.mm2-profile-avatar {
  width: 88px;
  height: 88px;
  flex-shrink: 0;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--brand-gradient);
  color: var(--on-accent);
  font-size: 32px;
  font-weight: 700;
}

.mm2-profile-grid {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px 24px;
  min-width: 0;
}

.mm2-profile-row {
  display: flex;
  align-items: baseline;
  gap: 6px;
  font-size: 12px;
  line-height: 1.5;
}

.mm2-profile-label {
  flex-shrink: 0;
  color: var(--form-label-color);
  min-width: 108px;
}

.mm2-profile-colon {
  color: var(--text-subtle);
}

.mm2-profile-value {
  color: var(--text-body);
  min-width: 0;
  word-break: break-all;
}

.mm2-body {
  display: flex;
  gap: 10px;
  align-items: flex-start;
  min-height: 0;
}

.mm2-sidebar {
  flex: 0 0 200px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.mm2-sidebar-item {
  display: flex;
  align-items: center;
  gap: 8px;
  width: 100%;
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--surface-panel);
  color: var(--text-muted);
  font-size: 12px;
  text-align: left;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s, color 0.15s;
}

.mm2-sidebar-item:hover {
  background: var(--surface-row-hover);
  color: var(--text-body);
}

.mm2-sidebar-item.is-active {
  border-color: var(--accent-border);
  background: var(--accent-light);
  color: var(--accent-primary);
  font-weight: 600;
}

.mm2-detail-panel {
  flex: 1;
  min-width: 0;
  background: var(--surface-panel);
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
}

.mm2-detail-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  background: var(--surface-toolbar);
}

.mm2-detail-header-icon {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 22px;
  height: 22px;
  border-radius: 4px;
  background: var(--section-icon-bg);
  color: var(--accent-primary);
}

.mm2-detail-header-title {
  flex: 1;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-body);
}

.mm2-detail-header-chevron {
  color: var(--muted-foreground);
}

.mm2-detail-body {
  padding: 0;
}

.mm2-detail-table {
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;
}

.mm2-detail-label {
  width: 140px;
  padding: 8px 12px;
  font-size: 12px;
  font-weight: 500;
  color: var(--form-label-color);
  background: var(--surface-toolbar);
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}

.mm2-detail-value {
  padding: 8px 12px;
  font-size: 12px;
  color: var(--text-body);
  background: var(--surface-panel);
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}

.mm2-detail-table tr:last-child .mm2-detail-label,
.mm2-detail-table tr:last-child .mm2-detail-value {
  border-bottom: none;
}

.mm2-field-value {
